<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page title</title>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    <style>
        #container{
            display:flex;
            justifying-content:center;
            flex-wrap:wrap;
            gap:12px;
        }
        .card{
            border:2px solid black;
            border-radius:9px;
            width:200px;
            padding:20px;
            text-align:center;
        }
    </style>
</head>
<body>
    <div id="container"></div>
   <script>
       $.ajax(
       {
           url:"https://fakestoreapi.com/products",
           method:"GET",
           dataType:"JSON",
           success:function(data)
           {
               let str="";
               for(let i=0;i<data.length;i++)
               {
                   str+="<div class='card'>";
                   str+="<img src='"+data[i].image+"' height='100px' width='100px'>";
                   str+="<h5>"+data[i].title+"</h5>";
                   str+="<p>"+data[i].price+"</p>";
                   str+="</div>";
               }
               $("#container").html(str);
           },
           error: function(err)
           {
               console.log(err);
           }
       });
   </script>    
</body>
</html>
