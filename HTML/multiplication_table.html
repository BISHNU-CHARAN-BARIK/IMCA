<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n;
        let input=prompt("please enter the number:");
        function generate_table(n)
        {
            for(let i=1;i<=10;i++)
            {
                let result=n*i;
                console.log(n+'*'+i+'='+result);
            }
        }
        generate_table(input);
    </script>
</body>
